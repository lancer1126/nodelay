<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoDelay</title>
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #f5f5f5;
        transition: opacity 260ms ease;
      }

      #boot-splash.boot-splash-hide {
        opacity: 0;
        pointer-events: none;
      }

      #boot-splash .boot-bars {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        height: 64px;
      }

      #boot-splash .boot-bar {
        width: 14px;
        height: 22px;
        border-radius: 1px;
        background: #111;
        animation: boot-bar-wave 900ms ease-in-out infinite;
        transform-origin: bottom center;
      }

      #boot-splash .boot-bar:nth-child(2) {
        animation-delay: 120ms;
      }

      #boot-splash .boot-bar:nth-child(3) {
        animation-delay: 240ms;
      }

      @keyframes boot-bar-wave {
        0%, 100% { height: 22px; opacity: 0.9; }
        50% { height: 52px; opacity: 1; }
      }
    </style>
  </head>

  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-bars">
        <span class="boot-bar"></span>
        <span class="boot-bar"></span>
        <span class="boot-bar"></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
